<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Accounts Linkbar</title>
    <style>
        :root {
            --accent: #7f80bd;
            --accent-hover: #5f60a3;
            --bg: #f5f5fa;
            --card: #ffffff;
            --text: #2c2c3e;
            --shadow: 0 4px 14px rgba(127, 128, 189, 0.18);
            --shadow-hover: 0 6px 20px rgba(127, 128, 189, 0.30);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 30px 20px;
            min-height: 100vh;
            background-color: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Modern rounded marquee */
        .marquee-box {
            width: 100%;
            max-width: 900px;
            background: linear-gradient(135deg, #7f80bd 0%, #9c9dd1 100%);
            color: white;
            border-radius: 16px;
            padding: 14px 0;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .marquee-box marquee {
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .marquee-box u {
            text-decoration: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.7);
            padding-bottom: 1px;
        }

        /* Single-row button bar */
        .button-row {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            width: 100%;
            max-width: 900px;
            margin-top: 10px;
        }

        .my-button {
            flex: 1 1 0;
            min-width: 0;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 600;
            background-color: var(--accent);
            color: white;
            text-align: center;
            text-decoration: none;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.25s ease;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .my-button:hover {
            background-color: var(--accent-hover);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .my-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="button-row">
        <a href="https://notebooklm.google.com/notebook/1de57e13-b1fc-4a1e-926e-05cdaa2a1e8a" class="my-button"
           onclick="window.open(this.href, '_blank', 'width=710,height=900'); return false;">
           Ask Accounts
        </a>

        <a href="https://cityoflewisvilletexas.github.io/col-fileshare/accountsdeskmetrics.html" class="my-button"
           onclick="window.open(this.href, target='_blank'); return false;">
           Desk Metrics
        </a>

        <a href="https://notebooklm.google.com/notebook/a496f4f6-6adc-4f97-a564-69e0274fe193" class="my-button"
           onclick="window.open(this.href, '_blank', 'width=710,height=900'); return false;">
           Shelver Helper
        </a>

        <a href="https://cityoflewisvilletexas.github.io/col-fileshare/lplnewslog.html" class="my-button"
           onclick="window.open(this.href, '_blank'); return false;">
           Newspaper Log
        </a>
    </div>

</body>
</html>
